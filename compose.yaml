services:
  server:
    build:
      context: ./vokai-server
    env_file:
      - ./vokai-server/.env
    ports:
      - "8000:8000"
    restart: unless-stopped

  client:
    build:
      context: ./vokai-client
      args:
        EXPO_PUBLIC_VOKAI_API_URL: ${EXPO_PUBLIC_VOKAI_API_URL:-http://localhost:8000}
    depends_on:
      - server
    ports:
      - "8080:80"
    restart: unless-stopped
